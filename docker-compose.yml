services:
  backend:
    build:
      context: ./Hermenius-Back
      dockerfile: Dockerfile
    container_name: hermenius-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - backend-uploads:/app/uploads
      - backend-cache:/app/.cache
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - hermenius-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,urllib.error; urllib.request.urlopen('http://localhost:8000/')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./Hermenius-Front
      dockerfile: Dockerfile
    container_name: hermenius-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - hermenius-net

volumes:
  backend-uploads:
    driver: local
  backend-cache:
    driver: local

networks:
  hermenius-net:
    driver: bridge
