<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Hermenius — Регистрация</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/register.css">
</head>
<body>

    <div class="page-container register-page">

        <!-- Шапка -->
        <header class="register-header">
            <a href="index.html" class="back-link">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                <span>На главную</span>
            </a>
        </header>

        <!-- Основной контент -->
        <main class="register-content">

            <div class="register-card">
                <div class="register-header-inner">
                    <div class="register-logo">
                        <span class="logo-hermenius">Hermenius</span>
                    </div>
                    <h1 class="register-title">Создание аккаунта</h1>
                    <p class="register-subtitle">Зарегистрируйтесь для доступа к аналитике</p>
                </div>

                <form id="registerForm" class="register-form">

                    <!-- ФИО -->
                    <div class="form-field">
                        <label class="form-label" for="fullname">
                            ФИО <span class="required">*</span>
                        </label>
                        <div class="form-input-wrapper">
                            <input type="text" id="fullname" name="fullname" class="form-input"
                                   placeholder="Иванов Иван Иванович" autocomplete="name">
                            <span class="form-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="12" cy="7" r="4"></circle>
                                </svg>
                            </span>
                        </div>
                        <p class="form-help" id="fullnameHelp">Введите фамилию, имя и отчество</p>
                    </div>

                    <!-- Email -->
                    <div class="form-field">
                        <label class="form-label" for="email">
                            Email <span class="required">*</span>
                        </label>
                        <div class="form-input-wrapper">
                            <input type="email" id="email" name="email" class="form-input"
                                   placeholder="example@company.ru" autocomplete="email">
                            <span class="form-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                                    <polyline points="22,6 12,13 2,6"></polyline>
                                </svg>
                            </span>
                        </div>
                        <p class="form-help" id="emailHelp">Корпоративный email для доступа</p>
                    </div>

                    <!-- Телефон -->
                    <div class="form-field">
                        <label class="form-label" for="phone">
                            Телефон <span class="required">*</span>
                        </label>
                        <div class="form-input-wrapper">
                            <input type="tel" id="phone" name="phone" class="form-input"
                                   placeholder="+7 (999) 123-45-67" autocomplete="tel">
                            <span class="form-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                                </svg>
                            </span>
                        </div>
                        <p class="form-help" id="phoneHelp">Формат: +7 (XXX) XXX-XX-XX</p>
                    </div>

                    <!-- Компания -->
                    <div class="form-field">
                        <label class="form-label" for="company">Компания</label>
                        <div class="form-input-wrapper">
                            <input type="text" id="company" name="company" class="form-input"
                                   placeholder="Название компании" autocomplete="organization">
                            <span class="form-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                                </svg>
                            </span>
                        </div>
                        <p class="form-help" id="companyHelp">Необязательно</p>
                    </div>

                    <!-- Согласие -->
                    <div class="form-field form-checkbox-field">
                        <label class="form-checkbox">
                            <input type="checkbox" id="agreement" name="agreement">
                            <span class="checkbox-mark"></span>
                            <span class="checkbox-label">
                                Я согласен на <a href="#" class="form-link">обработку персональных данных</a>
                            </span>
                        </label>
                    </div>

                    <!-- Кнопки -->
                    <div class="form-actions">
                        <button type="submit" class="form-btn form-btn-primary">
                            <span>Зарегистрироваться</span>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </button>
                        <button type="reset" class="form-btn form-btn-secondary">Очистить</button>
                    </div>

                </form>

                <div class="register-footer">
                    <p>Уже есть аккаунт? <a href="profile.html" class="form-link">Войти</a></p>
                </div>

            </div>

        </main>

    </div>

    <script src="js/main.js"></script>
    <script src="js/validation.js"></script>
</body>
</html>
