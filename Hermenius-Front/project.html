<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Hermenius — Проект</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/project.css">
    <link rel="stylesheet" href="css/themes.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.32.0/plotly.min.js"></script>
</head>
<body>

    <div class="page-container project-page">

        <!-- Шапка -->
        <header class="project-header">
            <a href="profile.html" class="back-link" data-i18n="back_projects">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                <span data-i18n="back_projects">К датасетам</span>
            </a>
            <div class="project-title-group">
                <h1 class="project-title" id="projectTitle">Анализ данных</h1>
                <span class="project-badge" id="projectBadge" style="display:none;"></span>
            </div>
            <div class="header-actions">
                <!-- Переключатель языка -->
                <button class="icon-btn lang-btn" id="langBtn" title="Language / Язык">
                    <span class="lang-label">РУ</span>
                </button>
                <!-- Настройки темы -->
                <button class="icon-btn" id="themeBtn" title="Темы оформления">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Основная область -->
        <main class="project-main">

            <!-- Подсказка drag/resize -->
            <div class="grid-hint" id="gridHint">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="5 9 2 12 5 15"></polyline><polyline points="12 15 19 9 22 12"></polyline></svg>
                <span data-i18n="drag_hint">Перетаскивайте карточки для изменения порядка. Потяните за угол для изменения размера.</span>
            </div>

            <!-- Метрики -->
            <div class="metrics-bar" id="metricsBar" style="display:none;"></div>

            <!-- Сетка графиков -->
            <div class="dashboard-grid" id="dashboardGrid">
                <!-- Заполняется из JS -->
            </div>

            <!-- Инсайты -->
            <div class="insights-section" id="insightsSection" style="display:none;">
                <h2 class="insights-title" data-i18n="ai_insights">ИИ-инсайты</h2>
                <div class="insights-list" id="insightsList"></div>
            </div>

            <!-- Информация о файле -->
            <div class="file-info-bar" id="fileInfoBar" style="display:none;">
                <span id="fileInfoName"></span>
                <span class="file-info-sep">|</span>
                <span id="fileInfoRows"></span>
                <span class="file-info-sep">|</span>
                <span id="fileInfoTime"></span>
            </div>

        </main>

    </div>

    <!-- Нижний монолит -->
    <footer class="project-footer">
        <div class="footer-monolith">
            <div class="footer-planks-container">

                <!-- Левая плашка: Экспорт -->
                <div class="footer-plank footer-plank-left" id="exportPlank" style="position:relative;">
                    <div class="footer-plank-inner" id="exportToggle">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <span data-i18n="export">Экспорт</span>
                    </div>
                </div>

                <!-- Правая плашка: Назад -->
                <div class="footer-plank footer-plank-right">
                    <a href="profile.html" class="footer-plank-inner" style="text-decoration:none;color:inherit;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                        <span data-i18n="back_projects">К датасетам</span>
                    </a>
                </div>

            </div>

            <!-- Полукруг -->
            <div class="half-wheel">
                <div class="half-wheel-inner">
                    <div class="half-wheel-grid">
                        <button class="wheel-btn" id="refreshBtn" data-i18n-title="refresh">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="23 4 23 10 17 10"></polyline>
                                <polyline points="1 20 1 14 7 14"></polyline>
                                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                            </svg>
                        </button>
                        <button class="wheel-btn" id="fullScreenBtn" data-i18n-title="fullscreen">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="15 3 21 3 21 9"></polyline>
                                <polyline points="9 21 3 21 3 15"></polyline>
                                <line x1="21" y1="3" x2="14" y2="10"></line>
                                <line x1="3" y1="21" x2="10" y2="14"></line>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </footer>

    <!-- ========== Темы ========== -->
    <div class="theme-panel-overlay" id="themePanel">
        <div class="theme-panel">
            <div class="theme-panel-header">
                <h2 class="theme-panel-title" data-i18n="themes">Темы оформления</h2>
                <button class="theme-panel-close" id="themePanelClose">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="theme-grid" id="themeGrid">
                <!-- Заполняется из JS -->
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/api.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/themes.js"></script>
    <script src="js/export.js"></script>
    <script src="js/project.js"></script>
</body>
</html>
