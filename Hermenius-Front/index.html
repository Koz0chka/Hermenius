<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hermenius</title>
    <style>
      #app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        color: #e0e0e0;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #app-loading .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255,255,255,0.1);
        border-top-color: #4fc3f7;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-right: 16px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="app-loading">
        <div style="text-align:center">
          <h1 style="font-size:32px;font-weight:700;margin:0 0 8px;color:#e0e0e0">Hermenius</h1>
          <p style="font-size:14px;opacity:0.6;margin:0;color:#e0e0e0">Загрузка...</p>
        </div>
      </div>
    </div>
    <script type="module" crossorigin src="/src/main.ts"></script>
  </body>
</html>
